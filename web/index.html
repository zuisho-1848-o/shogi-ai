<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>将棋AI</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Hiragino Kaku Gothic ProN', 'Yu Gothic', sans-serif;
    background: #1a1a2e;
    color: #eee;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px;
    overflow-x: auto;
  }

  header {
    font-size: 1.4em;
    font-weight: bold;
    letter-spacing: 0.1em;
    margin-bottom: 12px;
    color: #f0c070;
  }

  .game-area {
    display: flex;
    gap: 20px;
    align-items: flex-start;
  }

  /* ── 盤面エリア ── */
  .board-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
  }

  .file-labels {
    display: grid;
    grid-template-columns: repeat(9, 56px);
    margin-left: 4px;
    text-align: center;
    font-size: 0.85em;
    color: #aaa;
  }

  .board-row {
    display: flex;
    gap: 4px;
    align-items: stretch;
  }

  .rank-labels {
    display: flex;
    flex-direction: column;
    justify-content: space-around;
    font-size: 0.75em;
    color: #aaa;
    padding: 2px 0;
    width: 20px;
    text-align: center;
  }

  .board-container {
    position: relative;
    width: 504px;
    height: 504px;
  }

  .board {
    display: grid;
    grid-template-columns: repeat(9, 56px);
    grid-template-rows: repeat(9, 56px);
    border: 2px solid #5a3e00;
    background: #d4a74a;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    position: absolute;
    top: 0; left: 0;
  }

  .arrow-overlay {
    position: absolute;
    top: 0; left: 0;
    width: 504px; height: 504px;
    pointer-events: none;
    z-index: 10;
  }

  .cell {
    width: 56px; height: 56px;
    border: 1px solid #8b6000;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    position: relative;
    transition: background 0.1s;
  }
  .cell:hover { background: rgba(255,255,255,0.15); }
  .cell.selected { background: rgba(30,120,255,0.35); }
  .cell.legal-dest { background: rgba(50,200,80,0.22); }
  .cell.legal-dest::after {
    content: ''; position: absolute;
    width: 16px; height: 16px;
    border-radius: 50%;
    background: rgba(30,170,60,0.55);
    pointer-events: none;
  }
  .cell.last-move      { background: rgba(255,210,0,0.28); }
  .cell.last-move-from { background: rgba(80,160,255,0.18); }
  .cell.selected.legal-dest { background: rgba(30,120,255,0.35); }

  .piece {
    font-size: 1.55em; font-weight: bold; line-height: 1;
    user-select: none; pointer-events: none;
    text-shadow: 0 1px 1px rgba(0,0,0,0.15);
  }
  .piece.black { color: #1a1a1a; }
  .piece.white { color: #1a1a1a; transform: rotate(180deg); }
  .piece.promoted { color: #bb1111; }
  .piece.white.promoted { color: #bb1111; transform: rotate(180deg); }

  /* ── 持ち駒 ── */
  .hand-box {
    background: #16213e;
    border: 1px solid #2a4060;
    border-radius: 8px;
    padding: 12px;
  }
  .hand-box .label {
    font-size: 0.8em; color: #aaa;
    margin-bottom: 8px;
  }
  .hand-pieces { display: flex; flex-wrap: wrap; gap: 6px; }
  .hand-piece {
    background: #d4a74a; border: 2px solid #8b6000;
    border-radius: 4px; width: 44px; height: 44px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    cursor: pointer; position: relative;
    transition: background 0.1s, border-color 0.1s;
  }
  .hand-piece:hover { background: #e8bc60; }
  .hand-piece.selected { border-color: #2060ff; background: #c8d4f0; }
  .hand-piece.white-hand { transform: rotate(180deg); }
  .hand-piece .hp-kanji { font-size: 1.3em; font-weight: bold; color: #1a1a1a; }
  .hand-piece .hp-count {
    font-size: 0.68em; color: #444;
    position: absolute; bottom: 1px; right: 3px; font-weight: bold;
  }
  .hand-piece.white-hand .hp-count { transform: rotate(180deg); }

  /* ── サイドバー ── */
  .sidebar {
    display: flex; flex-direction: column; gap: 12px; width: 200px;
  }
  .controls { display: flex; flex-direction: column; gap: 10px; }
  .status-box {
    background: #16213e; border: 1px solid #2a4060;
    border-radius: 8px; padding: 12px; font-size: 0.9em; min-height: 70px;
  }
  .status-turn { font-size: 1.1em; font-weight: bold; margin-bottom: 6px; }
  .status-turn.black { color: #80c8ff; }
  .status-turn.white { color: #ff8080; }
  .status-info { color: #999; font-size: 0.85em; }

  .btn {
    padding: 10px 16px; border: none; border-radius: 6px;
    cursor: pointer; font-size: 0.95em; font-weight: bold;
    font-family: inherit; transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-new { background: #f0c040; color: #1a1a1a; }
  .btn-ai  { background: #3060c0; color: #fff; }

  .depth-row {
    display: flex; align-items: center; gap: 8px;
    font-size: 0.85em; color: #aaa;
  }
  select {
    background: #16213e; color: #eee;
    border: 1px solid #2a4060; border-radius: 4px;
    padding: 4px 8px; font-size: 0.9em;
    font-family: inherit; cursor: pointer;
  }

  .gameover-banner {
    display: none;
    background: linear-gradient(135deg, #1a1a2e, #16213e);
    border: 2px solid #f0c040; border-radius: 10px;
    padding: 16px 20px; text-align: center;
  }
  .gameover-banner.active { display: block; }
  .gameover-banner h2 { font-size: 1.4em; color: #f0c040; }
  .gameover-banner p  { color: #ccc; font-size: 0.85em; margin-top: 4px; }

  /* ── 下部パネル共通 ── */
  .bottom-panels {
    margin-top: 14px;
    width: 100%;
    max-width: 784px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .panel {
    background: #16213e; border: 1px solid #2a4060;
    border-radius: 8px; padding: 14px;
  }
  .panel-title {
    font-size: 0.8em; color: #f0c070;
    font-weight: bold; letter-spacing: 0.06em;
    margin-bottom: 10px;
  }

  /* ── 評価値グラフ ── */
  .chart-wrap { height: 160px; position: relative; }

  /* ── 候補手テーブル ── */
  .cand-grid {
    display: grid;
    grid-template-columns: 90px 90px 1fr 64px 1fr;
    /* 番手 | 指し手 | バー | 評価値 | 継続手 */
    align-items: center;
    gap: 0;
    font-size: 0.8em;
  }
  .cand-grid-header {
    display: contents;
    font-size: 0.75em;
    color: #666;
  }
  .cand-grid-header > div {
    padding: 0 4px 6px;
    border-bottom: 1px solid #1e3050;
  }
  .cand-row-grid {
    display: contents;
  }
  .cand-row-grid > div {
    padding: 6px 4px;
    border-bottom: 1px solid #111825;
    align-self: center;
  }
  .cand-row-grid:last-child > div { border-bottom: none; }

  .cand-rank-cell {
    font-weight: bold;
    font-size: 0.85em;
  }
  .cand-move-cell {
    font-family: monospace;
    color: #80c8ff;
    font-size: 0.95em;
  }
  .cand-bar-cell { padding-right: 8px !important; }
  .cand-bar-wrap { height: 8px; background: #0a0a1a; border-radius: 4px; overflow: hidden; }
  .cand-bar { height: 100%; border-radius: 4px; transition: width 0.3s; }
  .cand-score-cell { font-weight: bold; text-align: right; }
  .score-pos { color: #80c8ff; }
  .score-neg { color: #ff7070; }
  .score-zero { color: #aaa; }
  .cand-pv-cell { color: #555; font-family: monospace; font-size: 0.85em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  .arrow-toggle {
    display: flex; align-items: center; gap: 6px;
    font-size: 0.75em; color: #666; margin-bottom: 10px;
    cursor: pointer; user-select: none;
  }
  .arrow-toggle input { cursor: pointer; }
  .cand-empty { color: #555; font-size: 0.85em; font-style: italic; }

  /* ── モーダル ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.6); z-index: 100;
    align-items: center; justify-content: center;
  }
  .modal-overlay.active { display: flex; }
  .modal {
    background: #16213e; border: 2px solid #4080c0;
    border-radius: 12px; padding: 28px 36px; text-align: center;
  }
  .modal h2 { font-size: 1.2em; margin-bottom: 20px; color: #f0c040; }
  .modal-btns { display: flex; gap: 14px; justify-content: center; }
  .btn-promote    { background: #bb1111; color: #fff; }
  .btn-no-promote { background: #444;    color: #fff; }

  /* ── AI思考中 ── */
  .thinking-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.3); z-index: 50;
    align-items: center; justify-content: center;
    font-size: 1.4em; color: #fff; letter-spacing: 0.1em;
  }
  .thinking-overlay.active { display: flex; }
  .spinner {
    display: inline-block; width: 28px; height: 28px;
    border: 3px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.8s linear infinite; margin-right: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<header>将棋AI ― Phase 7</header>

<div class="game-area">
  <!-- 盤面 -->
  <div class="board-wrap">
    <div class="hand-box" style="width:100%">
      <div class="label">後手（AI）持ち駒</div>
      <div class="hand-pieces" id="white-hand"></div>
    </div>

    <div class="file-labels" id="file-labels"></div>

    <div class="board-row">
      <div class="board-container">
        <div class="board" id="board"></div>
        <svg class="arrow-overlay" id="arrow-overlay" viewBox="0 0 504 504"></svg>
      </div>
      <div class="rank-labels" id="rank-labels"></div>
    </div>

    <div class="hand-box" style="width:100%">
      <div class="label">先手（あなた）持ち駒</div>
      <div class="hand-pieces" id="black-hand"></div>
    </div>
  </div>

  <!-- サイドバー -->
  <div class="sidebar">
    <div class="controls">
      <div class="status-box">
        <div class="status-turn" id="status-turn">―</div>
        <div class="status-info"  id="status-info"></div>
      </div>
      <div class="depth-row">
        <label for="depth-sel">AI 強さ：</label>
        <select id="depth-sel">
          <option value="1">入門 (d1)</option>
          <option value="2">初級 (d2)</option>
          <option value="3" selected>中級 (d3)</option>
          <option value="4">上級 (d4)</option>
          <option value="5">最強 (d5)</option>
        </select>
      </div>
      <button class="btn btn-new" id="btn-new">▶ 新しい対局</button>
      <button class="btn btn-ai"  id="btn-ai" disabled>AI に指させる</button>
    </div>

    <div class="gameover-banner" id="gameover-banner">
      <h2 id="gameover-title"></h2>
      <p  id="gameover-sub"></p>
    </div>
  </div>
</div>

<!-- 下部パネル -->
<div class="bottom-panels">

  <!-- 評価値グラフ -->
  <div class="panel">
    <div class="panel-title">評価値グラフ（先手 ▲ 優勢 = 正 / 後手 ▽ 優勢 = 負）</div>
    <div class="chart-wrap"><canvas id="eval-chart"></canvas></div>
  </div>

  <!-- 候補手パネル -->
  <div class="panel">
    <div class="panel-title">候補手分析（手番側の上位手 ／ スコアは常に先手▲視点）</div>
    <label class="arrow-toggle">
      <input type="checkbox" id="show-arrows" checked>
      盤面に矢印を表示（金色=最善手、青=次善手以降）
    </label>
    <div id="candidates-list"><span class="cand-empty">対局開始後、AIが指した手番後に表示されます</span></div>
  </div>

</div>

<!-- 成りダイアログ -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <h2>成りますか？</h2>
    <div class="modal-btns">
      <button class="btn btn-promote"    id="btn-promote">成る</button>
      <button class="btn btn-no-promote" id="btn-no-promote">成らない</button>
    </div>
  </div>
</div>

<!-- AI思考中 -->
<div class="thinking-overlay" id="thinking-overlay">
  <div class="spinner"></div> AI が考えています…
</div>

<script>
// ─────────────────────────── 定数
const RANK_KANJI   = ['一','二','三','四','五','六','七','八','九'];
const HAND_ORDER   = ['rook','bishop','gold','silver','knight','lance','pawn'];
const PIECE_LETTER = {rook:'R', bishop:'B', gold:'G', silver:'S', knight:'N', lance:'L', pawn:'P'};
const PIECE_KANJI  = {
  pawn:'歩', lance:'香', knight:'桂', silver:'銀', gold:'金',
  bishop:'角', rook:'飛', king:'王',
  prom_pawn:'と', prom_lance:'杏', prom_knight:'圭',
  prom_silver:'全', prom_bishop:'馬', prom_rook:'龍',
};
const RANK_JA = {a:'一',b:'二',c:'三',d:'四',e:'五',f:'六',g:'七',h:'八',i:'九'};

// 矢印色（1番手=金色、以降青系で薄くなる）
const ARROW_COLORS = [
  { stroke:'rgba(255,210,0,0.90)',  fill:'rgba(255,210,0,0.90)'  },
  { stroke:'rgba(80,180,255,0.70)', fill:'rgba(80,180,255,0.70)' },
  { stroke:'rgba(80,180,255,0.50)', fill:'rgba(80,180,255,0.50)' },
  { stroke:'rgba(80,180,255,0.35)', fill:'rgba(80,180,255,0.35)' },
  { stroke:'rgba(80,180,255,0.25)', fill:'rgba(80,180,255,0.25)' },
  { stroke:'rgba(80,180,255,0.18)', fill:'rgba(80,180,255,0.18)' },
  { stroke:'rgba(80,180,255,0.12)', fill:'rgba(80,180,255,0.12)' },
  { stroke:'rgba(80,180,255,0.08)', fill:'rgba(80,180,255,0.08)' },
];

const CAND_RANK_LABELS = [
  '① 最善手', '② 次善手', '③ 3番手', '④ 4番手',
  '⑤ 5番手',  '⑥ 6番手',  '⑦ 7番手', '⑧ 8番手',
];

// ─────────────────────────── 状態
let state = null, selectedSq = null, selectedHand = null, pendingMove = null;

// ─────────────────────────── ユーティリティ
function sqToUsi(sq) {
  return `${9-(sq%9)}${'abcdefghi'[Math.floor(sq/9)]}`;
}
function usiCoordToSq(coord) {
  return ('abcdefghi'.indexOf(coord[1])) * 9 + (9 - parseInt(coord[0]));
}
function sqToXY(sq) {
  return { x: (sq % 9) * 56 + 28, y: Math.floor(sq / 9) * 56 + 28 };
}
function usiMoveToFromTo(m) {
  if (!m || m.length < 4 || m[1] === '*') return null;
  return { fromSq: usiCoordToSq(m.slice(0,2)), toSq: usiCoordToSq(m.slice(2,4)) };
}
// pieces を渡すと「3二金（4一）」形式、省略時は座標のみ
function usiToJa(m, pieces) {
  if (!m) return '';
  if (m[1] === '*') {
    // 打ち駒: "P*3b" → "3二歩打"
    const pieceName = Object.keys(PIECE_LETTER).find(k => PIECE_LETTER[k] === m[0]);
    const kanji = pieceName ? PIECE_KANJI[pieceName] : m[0];
    return `${m[2]}${RANK_JA[m[3]]||m[3]}${kanji}打`;
  }
  const toFile = m[2], toRank = RANK_JA[m[3]] || m[3];
  const fromFile = m[0], fromRank = RANK_JA[m[1]] || m[1];
  const promo = m.endsWith('+') ? '成' : '';
  let pieceKanji = '';
  if (pieces) {
    const fromSq = usiCoordToSq(m.slice(0, 2));
    const piece = pieces.find(p => p.sq === fromSq);
    if (piece) pieceKanji = piece.kanji;
  }
  return `${toFile}${toRank}${pieceKanji}${promo}（${fromFile}${fromRank}）`;
}
function legalDestsForSq(sq, legalMoves) {
  const fromUsi = sqToUsi(sq);
  const dests = new Map();
  for (const m of legalMoves) {
    if (m.length < 4 || m[2]==='*') continue;
    if (m.slice(0,2) !== fromUsi) continue;
    const dSq = usiCoordToSq(m.slice(2,4));
    if (!dests.has(dSq)) dests.set(dSq, {promote:null, noPromote:null});
    m.endsWith('+') ? (dests.get(dSq).promote = m) : (dests.get(dSq).noPromote = m);
  }
  return dests;
}
function legalDestsForDrop(name, legalMoves) {
  const letter = PIECE_LETTER[name];
  const dests = new Set();
  for (const m of legalMoves) {
    if (m[1]==='*' && m[0]===letter) dests.add(usiCoordToSq(m.slice(2,4)));
  }
  return dests;
}

// ─────────────────────────── 盤面初期化
function initBoard() {
  const fl = document.getElementById('file-labels');
  fl.innerHTML = '';
  for (let f=9; f>=1; f--) {
    const d = document.createElement('div'); d.textContent = f; fl.appendChild(d);
  }
  const rl = document.getElementById('rank-labels');
  rl.innerHTML = '';
  RANK_KANJI.forEach(k => { const d=document.createElement('div'); d.textContent=k; rl.appendChild(d); });
  const board = document.getElementById('board');
  board.innerHTML = '';
  for (let i=0; i<81; i++) {
    const cell = document.createElement('div');
    cell.className = 'cell'; cell.dataset.sq = i;
    cell.addEventListener('click', () => onCellClick(i));
    board.appendChild(cell);
  }
}

// ─────────────────────────── SVG矢印
function drawArrow(svg, x1, y1, x2, y2, color, sw) {
  const dx=x2-x1, dy=y2-y1, len=Math.sqrt(dx*dx+dy*dy);
  if (len < 1) return;
  const ahl = Math.min(18, len*0.35), ahw = ahl*0.7;
  const shrink = ahl*0.6;
  const ex = x2-dx/len*shrink, ey = y2-dy/len*shrink;
  const line = document.createElementNS('http://www.w3.org/2000/svg','line');
  line.setAttribute('x1',x1); line.setAttribute('y1',y1);
  line.setAttribute('x2',ex); line.setAttribute('y2',ey);
  line.setAttribute('stroke',color.stroke); line.setAttribute('stroke-width',sw);
  line.setAttribute('stroke-linecap','round');
  svg.appendChild(line);
  const ux=dx/len, uy=dy/len, px=-uy, py=ux;
  const poly = document.createElementNS('http://www.w3.org/2000/svg','polygon');
  poly.setAttribute('points',
    `${x2},${y2} ${x2-ux*ahl+px*ahw*0.5},${y2-uy*ahl+py*ahw*0.5} ${x2-ux*ahl-px*ahw*0.5},${y2-uy*ahl-py*ahw*0.5}`);
  poly.setAttribute('fill',color.fill);
  svg.appendChild(poly);
}

function renderArrows(candidates) {
  const svg = document.getElementById('arrow-overlay');
  svg.innerHTML = '';
  if (!candidates || !candidates.length) return;
  if (!document.getElementById('show-arrows').checked) return;
  for (let i=Math.min(candidates.length, ARROW_COLORS.length)-1; i>=0; i--) {
    const ft = usiMoveToFromTo(candidates[i].move);
    if (!ft) continue;
    const from = sqToXY(ft.fromSq), to = sqToXY(ft.toSq);
    drawArrow(svg, from.x, from.y, to.x, to.y, ARROW_COLORS[i], i===0?5:3);
  }
}

// ─────────────────────────── 盤面描画
function renderBoard() {
  if (!state) return;
  document.querySelectorAll('.cell').forEach(c => { c.className='cell'; c.innerHTML=''; });
  if (state.last_move && state.last_move.length>=4 && state.last_move[1]!=='*') {
    const dSq = usiCoordToSq(state.last_move.slice(2,4));
    const dc = document.querySelector(`.cell[data-sq="${dSq}"]`);
    if (dc) dc.classList.add('last-move');
    const fSq = usiCoordToSq(state.last_move.slice(0,2));
    const fc = document.querySelector(`.cell[data-sq="${fSq}"]`);
    if (fc) fc.classList.add('last-move-from');
  }
  state.pieces.forEach(p => {
    const cell = document.querySelector(`.cell[data-sq="${p.sq}"]`);
    if (!cell) return;
    const span = document.createElement('span');
    span.className = `piece ${p.color}${p.promoted?' promoted':''}`;
    span.textContent = p.kanji;
    cell.appendChild(span);
  });
  if (selectedSq !== null) {
    const sel = document.querySelector(`.cell[data-sq="${selectedSq}"]`);
    if (sel) sel.classList.add('selected');
    legalDestsForSq(selectedSq, state.legal_moves).forEach((_,dSq) => {
      const dc = document.querySelector(`.cell[data-sq="${dSq}"]`);
      if (dc) dc.classList.add('legal-dest');
    });
  }
  if (selectedHand !== null) {
    legalDestsForDrop(selectedHand, state.legal_moves).forEach(dSq => {
      const dc = document.querySelector(`.cell[data-sq="${dSq}"]`);
      if (dc) dc.classList.add('legal-dest');
    });
  }
  renderHand('black', state.hands.black, false);
  renderHand('white', state.hands.white, true);
  const turnEl = document.getElementById('status-turn');
  const infoEl = document.getElementById('status-info');
  if (state.is_game_over) {
    const w = state.winner;
    turnEl.textContent = w==='black' ? '先手の勝ち！' : '後手の勝ち！';
    turnEl.className = `status-turn ${w}`;
    infoEl.textContent = `${state.move_count} 手で終局`;
    showGameOver(w);
    document.getElementById('btn-ai').disabled = true;
  } else {
    const isBlack = state.turn==='black';
    turnEl.textContent = isBlack ? '▲ 先手（あなた）の番' : '△ 後手（AI）の番';
    turnEl.className = `status-turn ${state.turn}`;
    infoEl.textContent = `${state.move_count} 手目`;
    document.getElementById('btn-ai').disabled = !isBlack;
    document.getElementById('gameover-banner').classList.remove('active');
  }
}

function renderHand(color, hand, isWhite) {
  const el = document.getElementById(`${color}-hand`);
  el.innerHTML = '';
  HAND_ORDER.forEach(name => {
    const count = hand[name]||0;
    if (!count) return;
    const div = document.createElement('div');
    div.className = `hand-piece${isWhite?' white-hand':''}`;
    if (!isWhite && selectedHand===name) div.classList.add('selected');
    div.innerHTML = `<span class="hp-kanji">${PIECE_KANJI[name]}</span><span class="hp-count">${count>1?count:''}</span>`;
    if (!isWhite) div.addEventListener('click', () => onHandClick(name));
    el.appendChild(div);
  });
}

function showGameOver(winner) {
  const banner = document.getElementById('gameover-banner');
  banner.classList.add('active');
  document.getElementById('gameover-title').textContent = winner==='black' ? '先手の勝ち 🎉' : '後手（AI）の勝ち';
  document.getElementById('gameover-sub').textContent = `${state.move_count} 手で終局`;
}

// ─────────────────────────── 候補手パネル
function renderCandidates(candidates) {
  const el = document.getElementById('candidates-list');
  if (!candidates || !candidates.length) {
    el.innerHTML = '<span class="cand-empty">候補手なし（AIが手を指した後に更新されます）</span>';
    renderArrows([]);
    return;
  }

  // 最大絶対値（バー幅計算用）
  const absMax = Math.max(1, ...candidates.map(c => Math.abs(c.score)));

  // グリッド HTML 生成
  let html = `<div class="cand-grid">
    <div class="cand-grid-header">
      <div>番手</div><div>指し手</div><div>形勢バー</div><div style="text-align:right">評価値</div><div>継続手（PV）</div>
    </div>`;

  candidates.forEach((c, i) => {
    const label = CAND_RANK_LABELS[i] || `${i+1}番手`;
    const dotColor = ARROW_COLORS[i] ? ARROW_COLORS[i].stroke : 'rgba(80,180,255,0.5)';
    const pieces = state ? state.pieces : [];
    const jaMove = usiToJa(c.move, pieces);
    const scoreStr = (c.score > 0 ? '+' : '') + c.score;
    const scoreClass = c.score > 0 ? 'score-pos' : c.score < 0 ? 'score-neg' : 'score-zero';
    const barPct = Math.min(100, Math.abs(c.score) / absMax * 100).toFixed(1);
    const barCol = c.score >= 0 ? '#3060c0' : '#c03030';
    // PV は盤面状態が変わるため座標表記のまま
    const pvStr = (c.pv || []).slice(1, 5).map(m => usiToJa(m)).join(' ');

    html += `<div class="cand-row-grid">
      <div class="cand-rank-cell" style="color:${dotColor}">${label}</div>
      <div class="cand-move-cell">${jaMove}</div>
      <div class="cand-bar-cell"><div class="cand-bar-wrap"><div class="cand-bar" style="width:${barPct}%;background:${barCol}"></div></div></div>
      <div class="cand-score-cell ${scoreClass}">${scoreStr}</div>
      <div class="cand-pv-cell">${pvStr || '—'}</div>
    </div>`;
  });

  html += '</div>';
  el.innerHTML = html;
  renderArrows(candidates);
}

// ─────────────────────────── 評価値グラフ
let evalChart = null;

function initChart() {
  const ctx = document.getElementById('eval-chart').getContext('2d');
  evalChart = new Chart(ctx, {
    type: 'line',
    data: {
      labels: [],
      datasets: [{
        label: '評価値（先手視点）',
        data: [],
        borderWidth: 2,
        pointRadius: 2,
        pointHoverRadius: 5,
        tension: 0.3,
        fill: false,
        segment: {
          borderColor: ctx => ctx.p0.parsed.y >= 0 ? '#80c8ff' : '#ff7070',
        },
        pointBackgroundColor: '#80c8ff',
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 200 },
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { labels: { color: '#aaa', font: { size: 10 }, boxWidth: 10 } },
        tooltip: {
          backgroundColor: '#1a1a2e', borderColor: '#2a4060', borderWidth: 1,
          titleColor: '#aaa', bodyColor: '#eee',
          callbacks: {
            label: ctx => {
              const v = ctx.parsed.y;
              return `評価値: ${v>0?'+':''}${v}`;
            },
          },
        },
      },
      scales: {
        x: {
          title: { display: true, text: '手数', color: '#aaa', font: { size: 10 } },
          ticks: { color: '#888', font: { size: 9 } },
          grid: { color: '#1e2a3a' },
        },
        y: {
          title: { display: true, text: 'cp', color: '#aaa', font: { size: 10 } },
          ticks: { color: '#888', font: { size: 9 }, callback: v => v>0?`+${v}`:v },
          grid: {
            color: ctx => ctx.tick.value === 0 ? 'rgba(255,255,255,0.3)' : '#1e2a3a',
            lineWidth: ctx => ctx.tick.value === 0 ? 1.5 : 1,
          },
        },
      },
    },
  });
}

function updateChart(evalHistory) {
  if (!evalChart) return;
  if (!evalHistory) evalHistory = [];
  evalChart.data.labels = evalHistory.map((_, i) => `${i+1}手`);
  evalChart.data.datasets[0].data = evalHistory;
  evalChart.update('none');
}

// ─────────────────────────── WebSocket
let ws = null;
function connectWS() {
  const proto = location.protocol==='https:' ? 'wss:' : 'ws:';
  ws = new WebSocket(`${proto}//${location.host}/ws`);
  ws.onmessage = e => {
    const d = JSON.parse(e.data);
    if (d.eval_history !== undefined) updateChart(d.eval_history);
    if (d.last_candidates !== undefined) renderCandidates(d.last_candidates);
  };
  ws.onclose = () => setTimeout(connectWS, 2000);
  ws.onerror = () => ws.close();
}
setInterval(() => { if (ws && ws.readyState===WebSocket.OPEN) ws.send('ping'); }, 25000);

document.getElementById('show-arrows').addEventListener('change', () => {
  const cands = state && state.last_candidates ? state.last_candidates : [];
  renderArrows(cands);
});

// ─────────────────────────── クリック
function onCellClick(sq) {
  if (!state || state.is_game_over || state.turn!=='black') return;
  if (selectedHand !== null) {
    const move = `${PIECE_LETTER[selectedHand]}*${sqToUsi(sq)}`;
    clearSelection();
    if (state.legal_moves.includes(move)) sendMove(move);
    else renderBoard();
    return;
  }
  if (selectedSq !== null) {
    const dests = legalDestsForSq(selectedSq, state.legal_moves);
    if (dests.has(sq)) {
      const info = dests.get(sq);
      clearSelection();
      if (info.promote && info.noPromote) {
        pendingMove = info;
        document.getElementById('modal-overlay').classList.add('active');
      } else {
        sendMove(info.promote ?? info.noPromote);
      }
      return;
    }
    clearSelection();
  }
  const piece = state.pieces.find(p => p.sq===sq && p.color==='black');
  if (piece) { selectedSq = sq; renderBoard(); }
}

function onHandClick(name) {
  if (!state || state.is_game_over || state.turn!=='black') return;
  if (selectedHand===name) { clearSelection(); renderBoard(); return; }
  clearSelection(); selectedHand = name; renderBoard();
}

function clearSelection() { selectedSq = null; selectedHand = null; }

// ─────────────────────────── 成りダイアログ
document.getElementById('btn-promote').addEventListener('click', () => {
  if (!pendingMove) return;
  document.getElementById('modal-overlay').classList.remove('active');
  const move = pendingMove.promote; pendingMove = null; sendMove(move);
});
document.getElementById('btn-no-promote').addEventListener('click', () => {
  if (!pendingMove) return;
  document.getElementById('modal-overlay').classList.remove('active');
  const move = pendingMove.noPromote; pendingMove = null; sendMove(move);
});

// ─────────────────────────── サーバー通信
async function sendMove(usiMove) {
  try {
    const res = await fetch('/api/move', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({move: usiMove}),
    });
    if (!res.ok) throw new Error(await res.text());
    state = await res.json();
    renderBoard(); updateChart(state.eval_history);
    if (!state.is_game_over && state.turn==='white') requestAiMove();
  } catch (e) { console.error(e); alert('エラー: ' + e.message); }
}

async function requestAiMove() {
  const depth = parseInt(document.getElementById('depth-sel').value);
  document.getElementById('thinking-overlay').classList.add('active');
  document.getElementById('btn-ai').disabled = true;
  try {
    const res = await fetch('/api/ai-move', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({depth}),
    });
    if (!res.ok) throw new Error(await res.text());
    state = await res.json();
    renderBoard();
    updateChart(state.eval_history);
    renderCandidates(state.last_candidates);
  } catch (e) { console.error(e); alert('AI エラー: ' + e.message); }
  finally { document.getElementById('thinking-overlay').classList.remove('active'); }
}

document.getElementById('btn-ai').addEventListener('click', () => {
  if (!state || state.turn!=='black') return;
  requestAiMove();
});

document.getElementById('btn-new').addEventListener('click', async () => {
  clearSelection(); pendingMove = null;
  try {
    const res = await fetch('/api/new-game', {method:'POST'});
    state = await res.json();
    document.getElementById('gameover-banner').classList.remove('active');
    renderBoard(); updateChart([]); renderCandidates([]);
  } catch (e) { console.error(e); }
});

// ─────────────────────────── 初期化
(async () => {
  initBoard(); initChart(); connectWS();
  try {
    const res = await fetch('/api/state');
    state = await res.json();
    updateChart(state.eval_history || []);
    renderCandidates(state.last_candidates || []);
  } catch { /* サーバー未起動 */ }
  renderBoard();
})();
</script>

</html>
